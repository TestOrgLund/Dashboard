name: Export Issue URLs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Get repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo list TestOrgLund \
            --limit 500 \
            --json name \
            -q '.[].name' > repos.txt

      - name: Collect issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          echo "# Issue URLs" > issues.md
          echo "" >> issues.md

          while read REPO
          do
            echo "## $REPO" >> issues.md

            gh issue list \
              --repo TestOrgLund/$REPO \
              --state all \
              --json url,title,state \
              | jq -r '.[] | "- " + .url + " (" + .state + ")"' \
              >> issues.md || true

            echo "" >> issues.md

          done < repos.txt