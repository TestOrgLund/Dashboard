name: Generate Issue Dashboard

on:
  #schedule:
    #- cron: "0 * * * *"   # varje timme
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate Dashboard
        uses: ethomson/issue-dashboard@v1
        with:
          token: ${{ github.token }}
          config: |
            title: "Issue Dashboard"

            output:
              format: markdown
              filename: dashboard.md

            sections:
              - title: "All issues"
                widgets:
                  - type: table
                    issue_query: org:MY-ORG is:issue is:open