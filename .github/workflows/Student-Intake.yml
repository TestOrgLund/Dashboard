name: Student Intake

on:
  repository_dispatch:
    types: [submission]

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create issue from student repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          REPO="${{ github.event.client_payload.repo }}"
          STUDENT="${{ github.event.client_payload.student }}"

          TITLE="Inlämning: $REPO"

          BODY="👤 Student: $STUDENT
📦 Repo: https://github.com/$REPO"

          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body "$BODY")

          echo "Created: $ISSUE_URL"