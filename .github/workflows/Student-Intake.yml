name: Submit to teacher system

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send submission event
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/TestOrgLund/Dashboard/dispatches \
            -d '{
              "event_type": "submission",
              "client_payload": {
                "repo": "${{ github.repository }}",
                "student": "${{ github.actor }}"
              }
            }'